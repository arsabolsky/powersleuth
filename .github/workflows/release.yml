name: Release App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version label for the artifact (e.g. 0.1.0)'
        required: false
        default: 'dev'

permissions:
  contents: write   # needed to create a GitHub Release on tag

jobs:
  package:
    name: Build & Package .app
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Resolve Swift Package dependencies
        run: |
          xcodebuild -resolvePackageDependencies \
            -scheme PowerSleuth \
            -derivedDataPath .build

      - name: Determine version
        id: ver
        run: |
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build Release (ad-hoc signed)
        run: |
          set -o pipefail
          xcodebuild build \
            -scheme PowerSleuth \
            -configuration Release \
            -destination 'generic/platform=macOS' \
            -derivedDataPath .build \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=YES \
            DEVELOPMENT_TEAM="" \
            | tee build.log

      - name: Locate and ad-hoc re-sign the app
        id: app
        run: |
          APP=$(find .build/Build/Products/Release -maxdepth 1 -name 'PowerSleuth.app' -print -quit)
          if [ -z "$APP" ]; then echo "PowerSleuth.app not found"; exit 1; fi
          echo "Found: $APP"
          # Ensure a valid ad-hoc signature so Gatekeeper will let the user open it.
          codesign --force --deep --sign - "$APP"
          codesign --verify --deep --strict --verbose=2 "$APP"
          echo "app_path=$APP" >> "$GITHUB_OUTPUT"

      - name: Zip the app bundle
        run: |
          VER="${{ steps.ver.outputs.version }}"
          ditto -c -k --sequesterRsrc --keepParent \
            "${{ steps.app.outputs.app_path }}" \
            "PowerSleuth-${VER}.zip"
          ls -lh "PowerSleuth-${VER}.zip"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: PowerSleuth-${{ steps.ver.outputs.version }}
          path: PowerSleuth-${{ steps.ver.outputs.version }}.zip
          if-no-files-found: error

      - name: Create GitHub Release (tags only)
        if: github.ref_type == 'tag'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VER="${{ steps.ver.outputs.version }}"
          {
            printf 'PowerSleuth %s — macOS battery drain analyzer.\n\n' "${{ github.ref_name }}"
            printf '**Install:** unzip and move `PowerSleuth.app` to /Applications.\n\n'
            printf 'This build is **ad-hoc signed**, not notarized. On first launch macOS\n'
            printf 'Gatekeeper warns it is from an unidentified developer. To open it:\n'
            printf 'right-click the app -> **Open** -> **Open**, or run:\n\n'
            printf '```\nxattr -dr com.apple.quarantine /Applications/PowerSleuth.app\n```\n\n'
            printf 'Requires macOS 15+ (Apple Intelligence features require macOS 26 / Tahoe).\n'
          } > release-notes.md
          gh release create "${{ github.ref_name }}" \
            "PowerSleuth-${VER}.zip" \
            --title "PowerSleuth ${{ github.ref_name }}" \
            --notes-file release-notes.md
