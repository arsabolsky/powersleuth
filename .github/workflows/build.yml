name: Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Test
    # macOS 26 runner: provides the macOS 26 SDK + Xcode 26 required for
    # FoundationModels (Apple Intelligence) and the -weak_framework link flag.
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show toolchain
        run: |
          xcodebuild -version
          swift --version
          xcrun --sdk macosx --show-sdk-version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Resolve Swift Package dependencies
        run: |
          xcodebuild -resolvePackageDependencies \
            -scheme PowerSleuth \
            -derivedDataPath .build

      - name: Build (Debug, unsigned)
        run: |
          set -o pipefail
          xcodebuild build \
            -scheme PowerSleuth \
            -configuration Debug \
            -destination 'platform=macOS' \
            -derivedDataPath .build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            | tee build.log

      - name: Test
        run: |
          set -o pipefail
          xcodebuild test \
            -scheme PowerSleuth \
            -destination 'platform=macOS' \
            -derivedDataPath .build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            | tee test.log

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            build.log
            test.log
          if-no-files-found: ignore
